name: Weekly Tech Summary

on:
  schedule:
    # KST 월요일 09:00 = UTC 월요일 00:00
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate weekly summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_weekly_summary.py

      - name: Commit weekly summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weekly-tech-news/
          if ! git diff --cached --quiet; then
            WEEK=$(TZ=Asia/Seoul python3 -c "from datetime import datetime, timedelta; from zoneinfo import ZoneInfo; t = datetime.now(ZoneInfo('Asia/Seoul')).date(); m = t - timedelta(days=t.weekday()+7); y, w, _ = m.isocalendar(); print(f'{y}-W{w:02d}')")
            git commit -m "chore: ${WEEK} 주간 종합 자동 생성"
            git push
          else
            echo "No changes to commit"
          fi
