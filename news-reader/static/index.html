<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tech News Reader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 헤더 */
  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #f0f6fc;
  }
  header .icon { font-size: 24px; }

  /* 메인 레이아웃 */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* 사이드바 - 날짜 목록 */
  .sidebar {
    width: 200px;
    background: #161b22;
    border-right: 1px solid #30363d;
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar .date-btn {
    display: block;
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: #8b949e;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sidebar .date-btn:hover {
    background: #1f2937;
    color: #e1e4e8;
  }
  .sidebar .date-btn.active {
    background: #1f6feb22;
    color: #58a6ff;
    border-left: 3px solid #58a6ff;
    font-weight: 600;
  }
  .sidebar .label {
    padding: 8px 20px;
    font-size: 11px;
    color: #484f58;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .sidebar .tab-btn {
    display: block;
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: #8b949e;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    border-top: 1px solid #30363d;
    margin-top: 8px;
  }
  .sidebar .tab-btn:hover { background: #1f2937; color: #e1e4e8; }
  .sidebar .tab-btn.active {
    background: #23893622;
    color: #3fb950;
    border-left: 3px solid #3fb950;
    font-weight: 600;
  }
  .sidebar .exp-btn {
    display: block;
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: #8b949e;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .sidebar .exp-btn:hover { background: #1f2937; color: #e1e4e8; }
  .sidebar .exp-btn.active {
    background: #d2691e22;
    color: #ffa657;
    border-left: 3px solid #ffa657;
    font-weight: 600;
  }
  .sidebar .collapse-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 20px;
    font-size: 11px;
    color: #484f58;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
    user-select: none;
  }
  .sidebar .collapse-header:hover { color: #8b949e; }
  .sidebar .collapse-header::after { content: '▸'; transition: transform 0.2s; margin-left: 4px; }
  .sidebar .collapse-header.open::after { transform: rotate(90deg); }
  .sidebar .collapse-body { display: none; }
  .sidebar .collapse-body.show { display: block; }
  .sidebar .weekly-summary-btn {
    background: #1f6feb22;
    color: #58a6ff;
    border: 1px solid #58a6ff44;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 10px;
    margin-right: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sidebar .weekly-summary-btn:hover { background: #1f6feb44; color: #79b8ff; }
  .sidebar .weekly-summary-btn.active { background: #1f6feb; color: #fff; }
  .sidebar .wt-btn {
    display: block;
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: #8b949e;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .sidebar .wt-btn:hover { background: #1f2937; color: #e1e4e8; }
  .sidebar .wt-btn.active {
    background: #a371f722;
    color: #d2a8ff;
    border-left: 3px solid #d2a8ff;
    font-weight: 600;
  }

  /* 뉴스 본문 */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
  }
  .content .empty {
    color: #484f58;
    text-align: center;
    margin-top: 120px;
    font-size: 16px;
  }

  /* 마크다운 스타일링 */
  .news-body h1 { font-size: 24px; color: #f0f6fc; margin: 0 0 24px; padding-bottom: 12px; border-bottom: 1px solid #30363d; }
  .news-body h2 { font-size: 18px; color: #58a6ff; margin: 28px 0 14px; }
  .news-body h3 { font-size: 15px; color: #e1e4e8; margin: 18px 0 8px; }
  .news-body p { line-height: 1.7; margin: 6px 0; color: #c9d1d9; }
  .news-body ul { padding-left: 20px; margin: 8px 0; }
  .news-body li { line-height: 1.7; margin: 4px 0; color: #c9d1d9; }
  .news-body a { color: #58a6ff; text-decoration: none; }
  .news-body a:hover { text-decoration: underline; }
  .news-body hr { border: none; border-top: 1px solid #30363d; margin: 24px 0; }
  .news-body strong { color: #f0f6fc; }
  .news-body code { background: #1f2937; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .news-body table { border-collapse: collapse; margin: 12px 0; width: 100%; }
  .news-body th, .news-body td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
  .news-body th { background: #161b22; color: #f0f6fc; }

  /* 읽고 있는 섹션 하이라이트 */
  .news-body .reading { background: #1f6feb15; border-left: 3px solid #58a6ff; padding-left: 12px; transition: all 0.3s; }

  /* TTS 컨트롤 바 */
  .tts-bar {
    background: #161b22;
    border-top: 1px solid #30363d;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tts-bar button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e1e4e8;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tts-bar button:hover { background: #30363d; }
  .tts-bar button.playing { background: #1f6feb; border-color: #1f6feb; }
  .tts-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

  .tts-bar .speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 12px;
    color: #8b949e;
    font-size: 13px;
  }
  .tts-bar input[type="range"] {
    width: 100px;
    accent-color: #58a6ff;
  }

  .tts-bar .status {
    margin-left: auto;
    color: #8b949e;
    font-size: 13px;
  }

  .tts-bar .progress-bar {
    flex: 1;
    max-width: 300px;
    height: 4px;
    background: #21262d;
    border-radius: 2px;
    margin-left: 16px;
    overflow: hidden;
  }
  .tts-bar .progress-fill {
    height: 100%;
    background: #58a6ff;
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }
</style>
</head>
<body>

<header>
  <span class="icon">📡</span>
  <h1>Daily Tech News Reader</h1>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="label">날짜 선택</div>
    <div id="dateList"></div>
    <div class="collapse-header" id="expHeader" style="margin-top:8px;">체험 노트</div>
    <div class="collapse-body" id="expBody">
      <div id="expList"></div>
    </div>
    <div class="collapse-header" id="wtHeader">테스트해볼만한 것들</div>
    <div class="collapse-body" id="wtBody">
      <div id="wtList"></div>
    </div>
    <div class="collapse-header" id="urHeader">사용자 요청 테스트</div>
    <div class="collapse-body" id="urBody">
      <div id="urList"></div>
    </div>
    <div class="collapse-header" id="doneHeader">테스트 완료 목록</div>
    <div class="collapse-body" id="doneBody">
      <div id="doneList"></div>
    </div>
    <button class="tab-btn" id="btnGuide">📘 Claude Code 가이드</button>
  </aside>

  <main class="content">
    <div id="newsBody" class="news-body">
      <div class="empty">왼쪽에서 날짜를 선택하세요</div>
    </div>
  </main>
</div>

<div class="tts-bar">
  <button id="btnPlay" disabled>▶ 재생</button>
  <button id="btnPause" disabled>⏸ 일시정지</button>
  <button id="btnStop" disabled>⏹ 정지</button>

  <div class="progress-bar">
    <div id="progressFill" class="progress-fill"></div>
  </div>

  <div class="speed-control">
    <span>속도</span>
    <input type="range" id="speedRange" min="0.7" max="1.8" step="0.1" value="1.0">
    <span id="speedLabel">1.0x</span>
  </div>

  <div id="status" class="status">대기 중</div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
const newsBody = $('#newsBody');
const btnPlay = $('#btnPlay');
const btnPause = $('#btnPause');
const btnStop = $('#btnStop');
const statusEl = $('#status');
const progressFill = $('#progressFill');
const speedRange = $('#speedRange');
const speedLabel = $('#speedLabel');

let currentDate = null;
let audio = new Audio();
let isPlaying = false;

// 속도 조절
speedRange.addEventListener('input', () => {
  const val = parseFloat(speedRange.value).toFixed(1);
  speedLabel.textContent = val + 'x';
  audio.playbackRate = parseFloat(val);
});

// 날짜 목록 로드 (주차별 그룹화)
function getWeekStart(dateStr) {
  // 해당 날짜가 속한 주의 월요일 (YYYY-MM-DD) 반환
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay(); // 0=일, 1=월, ..., 6=토
  const offset = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + offset);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatWeekRange(weekStart) {
  // 주의 목요일이 속한 월의 N주차로 표기 (ISO 기준)
  const monday = new Date(weekStart + 'T00:00:00');
  const thursday = new Date(monday);
  thursday.setDate(thursday.getDate() + 3);

  const year = thursday.getFullYear();
  const monthIdx = thursday.getMonth();
  const month = monthIdx + 1;

  // 해당 월의 첫 목요일
  const firstDay = new Date(year, monthIdx, 1);
  const firstDow = firstDay.getDay();
  const offsetToThu = (4 - firstDow + 7) % 7;
  const firstThu = new Date(firstDay);
  firstThu.setDate(firstThu.getDate() + offsetToThu);

  const weekNum = Math.floor((thursday - firstThu) / (7 * 86400000)) + 1;
  return `${month}월 ${weekNum}주차`;
}

function getISOWeekId(dateStr) {
  // 'YYYY-MM-DD' → 'YYYY-Www' (ISO week)
  const d = new Date(dateStr + 'T00:00:00');
  const dayNum = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - dayNum);
  const yearStart = new Date(d.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
  return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
}

async function loadDates() {
  const [datesRes, weeksRes] = await Promise.all([
    fetch('/api/dates').then(r => r.json()),
    fetch('/api/weeks').then(r => r.json()).catch(() => ({ weeks: [] })),
  ]);
  const data = datesRes;
  const availableWeeks = new Set(weeksRes.weeks || []);
  const list = $('#dateList');

  if (data.dates.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:#484f58;font-size:13px">뉴스 파일이 없습니다</div>';
    return;
  }

  // 주차별 그룹핑 (날짜는 이미 내림차순)
  const groups = new Map();
  for (const d of data.dates) {
    const ws = getWeekStart(d);
    if (!groups.has(ws)) groups.set(ws, []);
    groups.get(ws).push(d);
  }

  const weekStarts = [...groups.keys()]; // 최신 주가 먼저
  list.innerHTML = weekStarts.map((ws, idx) => {
    const dates = groups.get(ws);
    const range = formatWeekRange(ws);
    const weekId = getISOWeekId(ws);
    const hasWeeklySummary = availableWeeks.has(weekId);
    const openClass = idx === 0 ? ' open' : '';
    const showClass = idx === 0 ? ' show' : '';
    const summaryBtn = hasWeeklySummary
      ? `<button class="weekly-summary-btn" data-week-id="${weekId}" title="주간 종합 보기">📊 종합</button>`
      : '';
    const buttons = dates.map(d => {
      const parts = d.split('-');
      const label = `${parts[0]}.${parts[1]}.${parts[2]}`;
      const weekday = ['일','월','화','수','목','금','토'][new Date(d + 'T00:00:00').getDay()];
      return `<button class="date-btn" data-date="${d}">${label} (${weekday})</button>`;
    }).join('');
    return `
      <div class="collapse-header${openClass}" data-week="${ws}">
        <span>${range} <span style="opacity:0.6;font-size:10px">${dates.length}건</span></span>
        ${summaryBtn}
      </div>
      <div class="collapse-body${showClass}" data-week-body="${ws}">${buttons}</div>
    `;
  }).join('');

  list.querySelectorAll('.collapse-header[data-week]').forEach(h => {
    h.addEventListener('click', (e) => {
      // 주간 종합 버튼 클릭은 헤더 토글에서 제외
      if (e.target.closest('.weekly-summary-btn')) return;
      h.classList.toggle('open');
      const body = list.querySelector(`[data-week-body="${h.dataset.week}"]`);
      if (body) body.classList.toggle('show');
    });
  });

  list.querySelectorAll('.weekly-summary-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      loadWeeklySummary(btn.dataset.weekId);
    });
  });

  list.querySelectorAll('.date-btn').forEach(btn => {
    btn.addEventListener('click', () => loadNews(btn.dataset.date));
  });

  loadNews(data.dates[0]);
}

// 체험 노트 목록 로드
async function loadExperiments() {
  const res = await fetch('/api/experiments');
  const data = await res.json();
  const list = $('#expList');

  if (data.experiments.length === 0) {
    list.innerHTML = '<div style="padding:10px 20px;color:#484f58;font-size:12px">아직 체험 노트가 없습니다</div>';
    return;
  }

  list.innerHTML = data.experiments
    .filter(e => !e.slug.startsWith('_'))
    .map(e => `<button class="exp-btn" data-slug="${e.slug}" title="${e.title}">🧪 ${e.title}</button>`)
    .join('');

  list.querySelectorAll('.exp-btn').forEach(btn => {
    btn.addEventListener('click', () => loadExperiment(btn.dataset.slug));
  });
}

// 체험 노트 로드
async function loadExperiment(slug) {
  stopTTS();
  currentDate = null;
  btnPlay.disabled = true;

  document.querySelectorAll('.date-btn, .exp-btn, .wt-btn').forEach(b => b.classList.remove('active'));
  $('#btnGuide').classList.remove('active');
  const activeBtn = document.querySelector(`.exp-btn[data-slug="${slug}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  const res = await fetch(`/api/experiment/${slug}`);
  const data = await res.json();

  newsBody.innerHTML = data.html;
  statusEl.textContent = `체험 노트: ${slug}`;
}

// 주간 테스트 접기/펼치기
$('#expHeader').addEventListener('click', () => {
  $('#expHeader').classList.toggle('open');
  $('#expBody').classList.toggle('show');
});

$('#wtHeader').addEventListener('click', () => {
  $('#wtHeader').classList.toggle('open');
  $('#wtBody').classList.toggle('show');
});

$('#urHeader').addEventListener('click', () => {
  $('#urHeader').classList.toggle('open');
  $('#urBody').classList.toggle('show');
});

$('#doneHeader').addEventListener('click', () => {
  $('#doneHeader').classList.toggle('open');
  $('#doneBody').classList.toggle('show');
});

// 주간 테스트 목록 로드
async function loadWeeklyTests() {
  const res = await fetch('/api/weekly-tests');
  const data = await res.json();
  const list = $('#wtList');

  if (data.weeks.length === 0) {
    list.innerHTML = '<div style="padding:10px 20px;color:#484f58;font-size:12px">항목이 없습니다</div>';
    return;
  }

  list.innerHTML = data.weeks
    .map(w => `<button class="wt-btn" data-slug="${w.slug}">${w.title}</button>`)
    .join('');

  list.querySelectorAll('.wt-btn').forEach(btn => {
    btn.addEventListener('click', () => loadWeeklyTest(btn.dataset.slug));
  });
}

// 주간 테스트 로드
async function loadWeeklyTest(slug) {
  stopTTS();
  currentDate = null;
  btnPlay.disabled = true;

  document.querySelectorAll('.date-btn, .exp-btn, .wt-btn').forEach(b => b.classList.remove('active'));
  $('#btnGuide').classList.remove('active');
  const activeBtn = document.querySelector(`.wt-btn[data-slug="${slug}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  const res = await fetch(`/api/weekly-test/${slug}`);
  const data = await res.json();

  newsBody.innerHTML = data.html;
  statusEl.textContent = `주간 테스트: ${slug}`;
}

// 뉴스 로드
async function loadNews(date) {
  stopTTS();
  currentDate = date;

  document.querySelectorAll('.date-btn, .exp-btn, .wt-btn, .weekly-summary-btn').forEach(b => b.classList.remove('active'));
  $('#btnGuide').classList.remove('active');
  const activeBtn = document.querySelector(`.date-btn[data-date="${date}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  const res = await fetch(`/api/news/${date}`);
  const data = await res.json();

  newsBody.innerHTML = data.html;
  btnPlay.disabled = false;
  statusEl.textContent = `${date} 뉴스 로드됨`;
}

async function loadWeeklySummary(weekId) {
  stopTTS();
  document.querySelectorAll('.date-btn, .exp-btn, .wt-btn, .weekly-summary-btn').forEach(b => b.classList.remove('active'));
  $('#btnGuide').classList.remove('active');
  const activeBtn = document.querySelector(`.weekly-summary-btn[data-week-id="${weekId}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  const res = await fetch(`/api/weeks/${weekId}`);
  if (!res.ok) {
    newsBody.innerHTML = `<p style="color:#f85149">주간 종합을 불러오지 못했습니다 (${weekId}).</p>`;
    return;
  }
  const data = await res.json();
  newsBody.innerHTML = data.html;
  btnPlay.disabled = true;
  statusEl.textContent = `📊 주간 종합: ${weekId}`;
}

// TTS 재생 (Edge TTS - AI 음성)
async function playTTS() {
  if (isPlaying && audio.paused) {
    audio.play();
    btnPlay.classList.add('playing');
    btnPlay.textContent = '▶ 재생 중';
    btnPause.textContent = '⏸ 일시정지';
    statusEl.textContent = '재생 중...';
    return;
  }

  if (isPlaying) return;

  btnPlay.disabled = true;
  statusEl.textContent = 'AI 음성 생성 중... (첫 재생 시 잠시 대기)';

  try {
    // 서버에서 AI TTS 오디오 가져오기
    const audioUrl = `/api/tts/${currentDate}`;
    audio.src = audioUrl;
    audio.playbackRate = parseFloat(speedRange.value);

    audio.onloadedmetadata = () => {
      isPlaying = true;
      btnPlay.disabled = false;
      btnPlay.classList.add('playing');
      btnPlay.textContent = '▶ 재생 중';
      btnPause.disabled = false;
      btnStop.disabled = false;
      statusEl.textContent = '재생 중...';
    };

    audio.ontimeupdate = () => {
      if (audio.duration) {
        const pct = (audio.currentTime / audio.duration * 100).toFixed(0);
        progressFill.style.width = pct + '%';
        const cur = formatTime(audio.currentTime);
        const dur = formatTime(audio.duration);
        statusEl.textContent = `재생 중... ${cur} / ${dur}`;
      }
    };

    audio.onended = () => stopTTS();

    audio.onerror = () => {
      statusEl.textContent = '오디오 로드 실패';
      btnPlay.disabled = false;
      stopTTS();
    };

    await audio.play();
  } catch (e) {
    statusEl.textContent = '재생 오류: ' + e.message;
    btnPlay.disabled = false;
  }
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// 일시정지
function pauseTTS() {
  if (isPlaying && !audio.paused) {
    audio.pause();
    btnPlay.classList.remove('playing');
    btnPlay.textContent = '▶ 재개';
    btnPause.textContent = '⏸ 일시정지됨';
    statusEl.textContent = '일시정지';
  }
}

// 정지
function stopTTS() {
  audio.pause();
  audio.currentTime = 0;
  isPlaying = false;
  btnPlay.classList.remove('playing');
  btnPlay.textContent = '▶ 재생';
  btnPlay.disabled = !currentDate;
  btnPause.disabled = true;
  btnPause.textContent = '⏸ 일시정지';
  btnStop.disabled = true;
  progressFill.style.width = '0%';
  statusEl.textContent = '대기 중';
}

btnPlay.addEventListener('click', playTTS);
btnPause.addEventListener('click', pauseTTS);
btnStop.addEventListener('click', stopTTS);

  currentDate = null;

<tr><td>testing-tools</td><td>테스트 자동 생성/실행 도구</td></tr>
</table>

<h4>마켓플레이스</h4>
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">
공식 마켓플레이스에서 플러그인을 검색하고 설치할 수 있습니다. 직접 마켓플레이스를 만들 수도 있습니다.
</p>
<table>
<tr><th>명령어</th><th>설명</th></tr>
<tr><td>/plugin marketplace add &lt;url&gt;</td><td>마켓플레이스 추가</td></tr>
<tr><td>/plugin marketplace list</td><td>등록된 마켓플레이스 목록</td></tr>
<tr><td>/plugin marketplace remove &lt;name&gt;</td><td>마켓플레이스 제거</td></tr>
</table>

<div class="tip">💡 <strong>스킬 vs 플러그인 차이:</strong> 스킬은 보통 단일 워크플로우(.md 파일 하나)에 가깝고, 플러그인은 여러 스킬, 명령어, 훅, 에이전트, 도구를 묶은 패키지입니다. 플러그인이 더 종합적이고 배포 가능한 단위입니다.</div>
</div>

<div class="acc-header">MCP 서버 (Model Context Protocol)</div>
<div class="acc-body">
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">MCP는 AI 모델에게 <strong>외부 도구, 데이터, 기능</strong>을 노출하는 표준 프로토콜입니다. OpenAI, Google, Microsoft 등 주요 AI 회사가 모두 채택하고 있어 사실상 표준이 되었습니다.</p>

<h4>주요 MCP 서버 예시</h4>
<table>
<tr><th>서버</th><th>제공 기능</th></tr>
<tr><td>context7</td><td>라이브러리/프레임워크 최신 문서 조회 (React, Django 등)</td></tr>
<tr><td>serena</td><td>심볼 기반 코드 탐색, 리팩토링 도구</td></tr>
<tr><td>playwright</td><td>브라우저 자동화, E2E 테스트, 스크린샷</td></tr>
<tr><td>magic-21st</td><td>UI 컴포넌트 빌더, 디자인 인스피레이션</td></tr>
<tr><td>sequential</td><td>단계별 사고 도구 (복잡한 추론용)</td></tr>
<tr><td>filesystem</td><td>파일 시스템 접근</td></tr>
<tr><td>github</td><td>GitHub 이슈/PR 관리</td></tr>
<tr><td>slack</td><td>Slack 메시지 송수신</td></tr>
<tr><td>postgres / sqlite</td><td>DB 쿼리 실행</td></tr>
</table>

<h4>MCP 관리 명령어</h4>
<table>
<tr><th>명령어</th><th>설명</th></tr>
<tr><td>/mcp</td><td>MCP 서버 연결 관리, OAuth 인증</td></tr>
<tr><td>claude mcp list</td><td>설치된 MCP 서버 목록</td></tr>
<tr><td>claude mcp add &lt;name&gt;</td><td>MCP 서버 추가</td></tr>
<tr><td>claude mcp remove &lt;name&gt;</td><td>MCP 서버 제거</td></tr>
<tr><td>claude --mcp-config &lt;file&gt;</td><td>특정 MCP 설정 파일 로드</td></tr>
</table>

<h4>MCP 설정 예시 (~/.claude/mcp.json)</h4>
<pre style="background:#161b22;padding:12px;border-radius:6px;overflow-x:auto;font-size:12px;color:#e6edf3;border:1px solid #30363d;">{
  "mcpServers": {
    "filesystem": {
      "command": "npx",
      "args": ["@modelcontextprotocol/server-filesystem", "/Users/me/projects"]
    },
    "github": {
      "command": "npx",
      "args": ["@modelcontextprotocol/server-github"],
      "env": { "GITHUB_TOKEN": "ghp_..." }
    }
  }
}</pre>

<div class="tip">💡 MCP 서버는 한 번 설정하면 어떤 AI 모델/플랫폼에서도 동일한 인터페이스로 사용할 수 있습니다. 자체 서비스나 데이터를 AI와 연동하려면 MCP 서버를 직접 만드는 것이 가장 표준적인 접근법입니다.</div>
</div>

<div class="acc-header">서브에이전트 (Subagents)</div>
<div class="acc-body">
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">서브에이전트는 <strong>특정 역할에 특화된 격리된 Claude 인스턴스</strong>입니다. 메인 세션의 컨텍스트를 오염시키지 않고 독립적으로 작업한 뒤 결과만 반환합니다.</p>

<h4>주요 서브에이전트 유형</h4>
<table>
<tr><th>에이전트</th><th>용도</th></tr>
<tr><td>general-purpose</td><td>범용 검색, 다단계 작업, 코드 탐색</td></tr>
<tr><td>Explore</td><td>코드베이스 빠른 탐색, 파일 패턴 검색</td></tr>
<tr><td>Plan</td><td>구현 전략 수립, 아키텍처 설계</td></tr>
<tr><td>code-reviewer</td><td>변경사항 보안/품질 리뷰</td></tr>
<tr><td>statusline-setup</td><td>Claude Code 상태 라인 설정</td></tr>
</table>

<h4>커스텀 서브에이전트 만들기</h4>
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">
<code>.claude/agents/&lt;agent-name&gt;.md</code> 파일로 정의합니다.
</p>
<pre style="background:#161b22;padding:12px;border-radius:6px;overflow-x:auto;font-size:12px;color:#e6edf3;border:1px solid #30363d;">---
name: cv-analyzer
description: CCTV 영상에서 차량 감지 및 정체 판단 전문가
tools: Read, Bash, Edit
model: opus
---
You are a computer vision expert specializing in traffic analysis.
- Use OpenCV best practices for ROI detection
- Validate accuracy with test images before finalizing
- Always check edge cases (night, rain, occlusion)</pre>

<div class="tip">💡 서브에이전트는 컨텍스트가 큰 작업(예: 전체 코드베이스 분석)을 격리해서 처리할 때 유용합니다. 메인 세션의 토큰을 절약하면서 깊이 있는 작업이 가능합니다.</div>
</div>

<div class="acc-header">훅 (Hooks) — 자동 실행</div>
<div class="acc-body">
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">훅은 특정 이벤트가 발생했을 때 <strong>자동으로 스크립트나 명령을 실행</strong>하는 기능입니다. settings.json에 정의하며, "X 할 때마다 Y 실행" 같은 자동화를 만들 수 있습니다.</p>

<h4>주요 훅 이벤트</h4>
<table>
<tr><th>이벤트</th><th>발생 시점</th></tr>
<tr><td>SessionStart</td><td>세션 시작 시 (예: npm install 자동 실행)</td></tr>
<tr><td>UserPromptSubmit</td><td>사용자 프롬프트 제출 시</td></tr>
<tr><td>PreToolUse</td><td>도구 사용 직전 (예: 위험한 명령 차단)</td></tr>
<tr><td>PostToolUse</td><td>도구 사용 직후 (예: 파일 수정 후 자동 lint)</td></tr>
<tr><td>PermissionRequest</td><td>권한 요청 시</td></tr>
<tr><td>PreCompact / PostCompact</td><td>컨텍스트 압축 전/후</td></tr>
<tr><td>SessionEnd</td><td>세션 종료 시</td></tr>
<tr><td>Stop</td><td>중지 시</td></tr>
</table>

<h4>훅 설정 예시 (.claude/settings.json)</h4>
<pre style="background:#161b22;padding:12px;border-radius:6px;overflow-x:auto;font-size:12px;color:#e6edf3;border:1px solid #30363d;">{
  "hooks": {
    "SessionStart": [{
      "type": "command",
      "command": "source venv/bin/activate"
    }],
    "PostToolUse": [{
      "matcher": "Edit|Write",
      "type": "command",
      "command": "npm run lint --fix"
    }],
    "PreToolUse": [{
      "matcher": "Bash",
      "type": "command",
      "command": "./scripts/check-safe-command.sh"
    }]
  }
}</pre>

<h4>훅 유형</h4>
<table>
<tr><th>유형</th><th>설명</th></tr>
<tr><td>command</td><td>외부 셸 스크립트/명령어 실행</td></tr>
<tr><td>http</td><td>HTTP POST 요청 (웹훅 연동)</td></tr>
<tr><td>prompt</td><td>AI 기반 의사결정 (예: 위험도 판단)</td></tr>
<tr><td>agent</td><td>서브에이전트 호출</td></tr>
</table>

<div class="tip">💡 훅은 "파일 저장 후 자동 포맷팅", "커밋 전 자동 테스트", "위험한 명령 자동 차단" 같은 자동화에 매우 유용합니다. 팀 워크플로우를 settings.json에 박제하면 모든 팀원이 동일한 자동화를 받을 수 있습니다.</div>
</div>

<div class="acc-header">효과적인 사용 팁</div>
<div class="acc-body">
<h4>프롬프트 잘 쓰는 법</h4>
<div class="tip">
❌ "이 기능 구현해줘"<br><br>
✅ "/src/auth 읽고 세션 관리 방식 파악해줘. Google OAuth를 추가하고 싶은데, 파일 변경, 로그인 흐름, 테스트 케이스 포함해줘. 테스트 돌려서 통과하는지 확인해줘."
</div>
<p>구체적인 파일/함수 지정 + 성공 기준 명시 + 테스트 방법 제시가 핵심.</p>

<h4>4단계 워크플로우</h4>
<p>1. <strong>Explore</strong> — Plan Mode(<code>Shift+Tab</code>)에서 코드 파악<br>
2. <strong>Plan</strong> — 구현 계획 작성, Claude와 합의<br>
3. <strong>Implement</strong> — Normal Mode로 전환 후 코딩<br>
4. <strong>Verify</strong> — 테스트 실행 + 커밋</p>

<h4>비용 절약</h4>
<p>• <code>/fast on</code>으로 빠른 모드 활성화<br>
• 간단한 작업은 Sonnet, 복잡한 추론은 Opus<br>
• <code>/compact</code>로 컨텍스트 정리 (토큰 비용 줄임)<br>
• <code>/cost</code>로 주기적 확인<br>
• MCP 서버 불필요한 것 제거</p>

<h4>바이브코딩 팁</h4>
<p>• CLAUDE.md에 프로젝트 맥락을 상세히 적어두기<br>
• <code>/voice</code>로 복잡한 요구사항 음성 전달<br>
• <code>/plan</code>으로 먼저 계획 확인 후 구현<br>
• 체크포인트 활용 — 마음에 안 들면 <code>Esc+Esc</code>로 되돌리기<br>
• <code>/loop</code>으로 테스트 자동 감시하면서 코딩</p>
</div>

<div class="acc-header">권한 모드</div>
<div class="acc-body">
<table>
<tr><th>모드</th><th>설명</th><th>용도</th></tr>
<tr><td>Default</td><td>모든 작업 전 승인 요청</td><td>처음 사용할 때, 중요한 작업</td></tr>
<tr><td>Plan</td><td>읽기만 하고 변경 안 함</td><td>코드 분석, 리뷰, 계획 수립</td></tr>
<tr><td>Auto</td><td>분류기가 자동 승인/거부</td><td>익숙한 프로젝트에서 빠른 작업</td></tr>
<tr><td>Bypass</td><td>모든 권한 프롬프트 스킵</td><td>신뢰할 수 있는 환경에서만</td></tr>
</table>
<div class="tip">💡 <code>Shift+Tab</code>으로 모드를 순환할 수 있음. Plan → 계획 확인 → Auto로 전환하여 구현하는 패턴이 효과적.</div>
</div>
`;

<h4>왜 MCP 대신 REST API로 가게 됐나</h4>
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">
처음엔 Claude Code의 <code>/schedule</code> 기능으로 구축하려 했으나 두 가지 제약이 발견됨:
</p>
<ol style="color:#c9d1d9;font-size:13px;line-height:1.8;padding-left:24px;">
<li><strong><code>/schedule</code>은 Anthropic 클라우드에서 실행</strong> → 로컬 MCP 서버(카카오봇, 네이버 검색)에 접근 불가</li>
<li><strong>GitHub 레포 연동 필수</strong> → 로컬 파일 시스템 접근 불가</li>
</ol>
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">
따라서 MCP 서버들은 <strong>로컬 검증/프로토타이핑 용도</strong>로만 쓰고, 실제 클라우드 자동화는 <strong>GitHub Actions + REST API 직접 호출</strong>로 재구현. MCP 테스트가 "이 API가 실제로 동작한다"는 검증 역할을 해준 셈.
</p>

<h4>Issue 1: Gemini 2.5 Flash 503 UNAVAILABLE</h4>

</div>

<h4>Issue 2: KAKAO_REFRESH_TOKEN 빈 값으로 저장됨</h4>
<div class="tip">
원인: 첫 시도에서 따옴표 escape 문제로 빈 문자열이 GitHub Secrets에 저장됨<br>
해결: 임시 파일 경유 + stdin으로 안전하게 재등록 (<code>gh secret set ... &lt; /tmp/file</code>)
</div>

<h4>Issue 3: 카톡 메시지 200자 제한으로 잘림</h4>
<div class="tip">

해결: text 템플릿 4개로 분할 전송 (headline + AI + 보안 + 도구). Gemini에 180자 이하 엄수 명령 + 초과 시 줄 단위로 잘라내기.
</div>

<h4>Issue 4: GitHub Actions 스케줄 지연</h4>
<div class="tip">
원인: GitHub Actions cron은 5~30분 지연이 정상 (피크타임엔 더 길어짐)<br>
대응: cron 시간을 목표보다 10-15분 일찍 설정 (예: 8:30 목표 → 8:15 cron)
</div>

function loadCompletedTests() {
  const list = $('#doneList');
  if (COMPLETED_TESTS.length === 0) {
    list.innerHTML = '<div style="padding:10px 20px;color:#484f58;font-size:12px">아직 완료된 테스트가 없습니다</div>';
    return;
  }
  list.innerHTML = COMPLETED_TESTS
    .map(t => `<button class="wt-btn" data-done-id="${t.id}" title="${t.title}">✅ ${t.title}</button>`)
    .join('');

  list.querySelectorAll('.wt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const test = COMPLETED_TESTS.find(t => t.id === btn.dataset.doneId);
      if (!test) return;
      stopTTS();
      currentDate = null;
      btnPlay.disabled = true;
      document.querySelectorAll('.date-btn, .exp-btn, .wt-btn').forEach(b => b.classList.remove('active'));
      $('#btnGuide').classList.remove('active');
      btn.classList.add('active');
      newsBody.innerHTML = test.html;
      statusEl.textContent = `완료된 테스트: ${test.title}`;
    });
  });
}

loadDates();
loadExperiments();
loadWeeklyTests();
loadUserRequestTests();
loadCompletedTests();
