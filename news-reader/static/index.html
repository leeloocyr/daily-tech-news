<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tech News Reader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 헤더 */
  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #f0f6fc;
  }
  header .icon { font-size: 24px; }

  /* 메인 레이아웃 */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* 사이드바 - 날짜 목록 */
  .sidebar {
    width: 200px;
    background: #161b22;
    border-right: 1px solid #30363d;
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar .date-btn {
    display: block;
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: #8b949e;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sidebar .date-btn:hover {
    background: #1f2937;
    color: #e1e4e8;
  }
  .sidebar .date-btn.active {
    background: #1f6feb22;
    color: #58a6ff;
    border-left: 3px solid #58a6ff;
    font-weight: 600;
  }
  .sidebar .label {
    padding: 8px 20px;
    font-size: 11px;
    color: #484f58;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .sidebar .tab-btn {
    display: block;
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: #8b949e;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    border-top: 1px solid #30363d;
    margin-top: 8px;
  }
  .sidebar .tab-btn:hover { background: #1f2937; color: #e1e4e8; }
  .sidebar .tab-btn.active {
    background: #23893622;
    color: #3fb950;
    border-left: 3px solid #3fb950;
    font-weight: 600;
  }
  .sidebar .exp-btn {
    display: block;
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: #8b949e;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .sidebar .exp-btn:hover { background: #1f2937; color: #e1e4e8; }
  .sidebar .exp-btn.active {
    background: #d2691e22;
    color: #ffa657;
    border-left: 3px solid #ffa657;
    font-weight: 600;
  }
  .sidebar .collapse-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 20px;
    font-size: 11px;
    color: #484f58;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
    user-select: none;
  }
  .sidebar .collapse-header:hover { color: #8b949e; }
  .sidebar .collapse-header::after { content: '▸'; transition: transform 0.2s; }
  .sidebar .collapse-header.open::after { transform: rotate(90deg); }
  .sidebar .collapse-body { display: none; }
  .sidebar .collapse-body.show { display: block; }
  .sidebar .wt-btn {
    display: block;
    width: 100%;
    padding: 10px 20px;
    background: none;
    border: none;
    color: #8b949e;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .sidebar .wt-btn:hover { background: #1f2937; color: #e1e4e8; }
  .sidebar .wt-btn.active {
    background: #a371f722;
    color: #d2a8ff;
    border-left: 3px solid #d2a8ff;
    font-weight: 600;
  }

  /* 뉴스 본문 */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
  }
  .content .empty {
    color: #484f58;
    text-align: center;
    margin-top: 120px;
    font-size: 16px;
  }

  /* 마크다운 스타일링 */
  .news-body h1 { font-size: 24px; color: #f0f6fc; margin: 0 0 24px; padding-bottom: 12px; border-bottom: 1px solid #30363d; }
  .news-body h2 { font-size: 18px; color: #58a6ff; margin: 28px 0 14px; }
  .news-body h3 { font-size: 15px; color: #e1e4e8; margin: 18px 0 8px; }
  .news-body p { line-height: 1.7; margin: 6px 0; color: #c9d1d9; }
  .news-body ul { padding-left: 20px; margin: 8px 0; }
  .news-body li { line-height: 1.7; margin: 4px 0; color: #c9d1d9; }
  .news-body a { color: #58a6ff; text-decoration: none; }
  .news-body a:hover { text-decoration: underline; }
  .news-body hr { border: none; border-top: 1px solid #30363d; margin: 24px 0; }
  .news-body strong { color: #f0f6fc; }
  .news-body code { background: #1f2937; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .news-body table { border-collapse: collapse; margin: 12px 0; width: 100%; }
  .news-body th, .news-body td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
  .news-body th { background: #161b22; color: #f0f6fc; }

  /* 읽고 있는 섹션 하이라이트 */
  .news-body .reading { background: #1f6feb15; border-left: 3px solid #58a6ff; padding-left: 12px; transition: all 0.3s; }

  /* TTS 컨트롤 바 */
  .tts-bar {
    background: #161b22;
    border-top: 1px solid #30363d;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tts-bar button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e1e4e8;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tts-bar button:hover { background: #30363d; }
  .tts-bar button.playing { background: #1f6feb; border-color: #1f6feb; }
  .tts-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

  .tts-bar .speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 12px;
    color: #8b949e;
    font-size: 13px;
  }
  .tts-bar input[type="range"] {
    width: 100px;
    accent-color: #58a6ff;
  }

  .tts-bar .status {
    margin-left: auto;
    color: #8b949e;
    font-size: 13px;
  }

  .tts-bar .progress-bar {
    flex: 1;
    max-width: 300px;
    height: 4px;
    background: #21262d;
    border-radius: 2px;
    margin-left: 16px;
    overflow: hidden;
  }
  .tts-bar .progress-fill {
    height: 100%;
    background: #58a6ff;
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }
</style>
</head>
<body>

<header>
  <span class="icon">📡</span>
  <h1>Daily Tech News Reader</h1>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="label">날짜 선택</div>
    <div id="dateList"></div>
    <div class="collapse-header" id="expHeader" style="margin-top:8px;">체험 노트</div>
    <div class="collapse-body" id="expBody">
      <div id="expList"></div>
    </div>
    <div class="collapse-header" id="wtHeader">테스트해볼만한 것들</div>
    <div class="collapse-body" id="wtBody">
      <div id="wtList"></div>
    </div>
    <div class="collapse-header" id="urHeader">사용자 요청 테스트</div>
    <div class="collapse-body" id="urBody">
      <div id="urList"></div>
    </div>
    <button class="tab-btn" id="btnGuide">📘 Claude Code 가이드</button>
  </aside>

  <main class="content">
    <div id="newsBody" class="news-body">
      <div class="empty">왼쪽에서 날짜를 선택하세요</div>
    </div>
  </main>
</div>

<div class="tts-bar">
  <button id="btnPlay" disabled>▶ 재생</button>
  <button id="btnPause" disabled>⏸ 일시정지</button>
  <button id="btnStop" disabled>⏹ 정지</button>

  <div class="progress-bar">
    <div id="progressFill" class="progress-fill"></div>
  </div>

  <div class="speed-control">
    <span>속도</span>
    <input type="range" id="speedRange" min="0.7" max="1.8" step="0.1" value="1.0">
    <span id="speedLabel">1.0x</span>
  </div>

  <div id="status" class="status">대기 중</div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
const newsBody = $('#newsBody');
const btnPlay = $('#btnPlay');
const btnPause = $('#btnPause');
const btnStop = $('#btnStop');
const statusEl = $('#status');
const progressFill = $('#progressFill');
const speedRange = $('#speedRange');
const speedLabel = $('#speedLabel');

let currentDate = null;
let audio = new Audio();
let isPlaying = false;

// 속도 조절
speedRange.addEventListener('input', () => {
  const val = parseFloat(speedRange.value).toFixed(1);
  speedLabel.textContent = val + 'x';
  audio.playbackRate = parseFloat(val);
});

// 날짜 목록 로드
async function loadDates() {
  const res = await fetch('/api/dates');
  const data = await res.json();
  const list = $('#dateList');

  if (data.dates.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:#484f58;font-size:13px">뉴스 파일이 없습니다</div>';
    return;
  }

  list.innerHTML = data.dates.map(d => {
    const parts = d.split('-');
    const label = `${parts[0]}.${parts[1]}.${parts[2]}`;
    const weekday = ['일','월','화','수','목','금','토'][new Date(d).getDay()];
    return `<button class="date-btn" data-date="${d}">${label} (${weekday})</button>`;
  }).join('');

  list.querySelectorAll('.date-btn').forEach(btn => {
    btn.addEventListener('click', () => loadNews(btn.dataset.date));
  });

  loadNews(data.dates[0]);
}

// 체험 노트 목록 로드
async function loadExperiments() {
  const res = await fetch('/api/experiments');
  const data = await res.json();
  const list = $('#expList');

  if (data.experiments.length === 0) {
    list.innerHTML = '<div style="padding:10px 20px;color:#484f58;font-size:12px">아직 체험 노트가 없습니다</div>';
    return;
  }

  list.innerHTML = data.experiments
    .filter(e => !e.slug.startsWith('_'))
    .map(e => `<button class="exp-btn" data-slug="${e.slug}" title="${e.title}">🧪 ${e.title}</button>`)
    .join('');

  list.querySelectorAll('.exp-btn').forEach(btn => {
    btn.addEventListener('click', () => loadExperiment(btn.dataset.slug));
  });
}

// 체험 노트 로드
async function loadExperiment(slug) {
  stopTTS();
  currentDate = null;
  btnPlay.disabled = true;

  document.querySelectorAll('.date-btn, .exp-btn, .wt-btn').forEach(b => b.classList.remove('active'));
  $('#btnGuide').classList.remove('active');
  const activeBtn = document.querySelector(`.exp-btn[data-slug="${slug}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  const res = await fetch(`/api/experiment/${slug}`);
  const data = await res.json();

  newsBody.innerHTML = data.html;
  statusEl.textContent = `체험 노트: ${slug}`;
}

// 주간 테스트 접기/펼치기
$('#expHeader').addEventListener('click', () => {
  $('#expHeader').classList.toggle('open');
  $('#expBody').classList.toggle('show');
});

$('#wtHeader').addEventListener('click', () => {
  $('#wtHeader').classList.toggle('open');
  $('#wtBody').classList.toggle('show');
});

$('#urHeader').addEventListener('click', () => {
  $('#urHeader').classList.toggle('open');
  $('#urBody').classList.toggle('show');
});

// 주간 테스트 목록 로드
async function loadWeeklyTests() {
  const res = await fetch('/api/weekly-tests');
  const data = await res.json();
  const list = $('#wtList');

  if (data.weeks.length === 0) {
    list.innerHTML = '<div style="padding:10px 20px;color:#484f58;font-size:12px">항목이 없습니다</div>';
    return;
  }

  list.innerHTML = data.weeks
    .map(w => `<button class="wt-btn" data-slug="${w.slug}">${w.title}</button>`)
    .join('');

  list.querySelectorAll('.wt-btn').forEach(btn => {
    btn.addEventListener('click', () => loadWeeklyTest(btn.dataset.slug));
  });
}

// 주간 테스트 로드
async function loadWeeklyTest(slug) {
  stopTTS();
  currentDate = null;
  btnPlay.disabled = true;

  document.querySelectorAll('.date-btn, .exp-btn, .wt-btn').forEach(b => b.classList.remove('active'));
  $('#btnGuide').classList.remove('active');
  const activeBtn = document.querySelector(`.wt-btn[data-slug="${slug}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  const res = await fetch(`/api/weekly-test/${slug}`);
  const data = await res.json();

  newsBody.innerHTML = data.html;
  statusEl.textContent = `주간 테스트: ${slug}`;
}

// 뉴스 로드
async function loadNews(date) {
  stopTTS();
  currentDate = date;

  document.querySelectorAll('.date-btn, .exp-btn, .wt-btn').forEach(b => b.classList.remove('active'));
  $('#btnGuide').classList.remove('active');
  const activeBtn = document.querySelector(`.date-btn[data-date="${date}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  const res = await fetch(`/api/news/${date}`);
  const data = await res.json();

  newsBody.innerHTML = data.html;
  btnPlay.disabled = false;
  statusEl.textContent = `${date} 뉴스 로드됨`;
}

// TTS 재생 (Edge TTS - AI 음성)
async function playTTS() {
  if (isPlaying && audio.paused) {
    audio.play();
    btnPlay.classList.add('playing');
    btnPlay.textContent = '▶ 재생 중';
    btnPause.textContent = '⏸ 일시정지';
    statusEl.textContent = '재생 중...';
    return;
  }

  if (isPlaying) return;

  btnPlay.disabled = true;
  statusEl.textContent = 'AI 음성 생성 중... (첫 재생 시 잠시 대기)';

  try {
    // 서버에서 AI TTS 오디오 가져오기
    const audioUrl = `/api/tts/${currentDate}`;
    audio.src = audioUrl;
    audio.playbackRate = parseFloat(speedRange.value);

    audio.onloadedmetadata = () => {
      isPlaying = true;
      btnPlay.disabled = false;
      btnPlay.classList.add('playing');
      btnPlay.textContent = '▶ 재생 중';
      btnPause.disabled = false;
      btnStop.disabled = false;
      statusEl.textContent = '재생 중...';
    };

    audio.ontimeupdate = () => {
      if (audio.duration) {
        const pct = (audio.currentTime / audio.duration * 100).toFixed(0);
        progressFill.style.width = pct + '%';
        const cur = formatTime(audio.currentTime);
        const dur = formatTime(audio.duration);
        statusEl.textContent = `재생 중... ${cur} / ${dur}`;
      }
    };

    audio.onended = () => stopTTS();

    audio.onerror = () => {
      statusEl.textContent = '오디오 로드 실패';
      btnPlay.disabled = false;
      stopTTS();
    };

    await audio.play();
  } catch (e) {
    statusEl.textContent = '재생 오류: ' + e.message;
    btnPlay.disabled = false;
  }
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// 일시정지
function pauseTTS() {
  if (isPlaying && !audio.paused) {
    audio.pause();
    btnPlay.classList.remove('playing');
    btnPlay.textContent = '▶ 재개';
    btnPause.textContent = '⏸ 일시정지됨';
    statusEl.textContent = '일시정지';
  }
}

// 정지
function stopTTS() {
  audio.pause();
  audio.currentTime = 0;
  isPlaying = false;
  btnPlay.classList.remove('playing');
  btnPlay.textContent = '▶ 재생';
  btnPlay.disabled = !currentDate;
  btnPause.disabled = true;
  btnPause.textContent = '⏸ 일시정지';
  btnStop.disabled = true;
  progressFill.style.width = '0%';
  statusEl.textContent = '대기 중';
}

btnPlay.addEventListener('click', playTTS);
btnPause.addEventListener('click', pauseTTS);
btnStop.addEventListener('click', stopTTS);

// Claude Code 가이드
$('#btnGuide').addEventListener('click', () => {
  stopTTS();
  currentDate = null;
  btnPlay.disabled = true;
  document.querySelectorAll('.date-btn, .exp-btn, .wt-btn').forEach(b => b.classList.remove('active'));
  $('#btnGuide').classList.add('active');
  statusEl.textContent = 'Claude Code 가이드';
  newsBody.innerHTML = GUIDE_HTML;
  // 아코디언 토글
  newsBody.querySelectorAll('.acc-header').forEach(h => {
    h.addEventListener('click', () => {
      h.classList.toggle('open');
      h.nextElementSibling.classList.toggle('show');
    });
  });
});

const GUIDE_HTML = `
<h1>Claude Code 가이드</h1>
<p style="color:#8b949e;margin-bottom:24px;">Claude Code를 잘 쓰기 위한 주요 기능, 명령어, 팁 정리</p>

<style>
.acc-header{cursor:pointer;padding:12px 16px;background:#161b22;border:1px solid #30363d;border-radius:6px;margin:6px 0;color:#f0f6fc;font-size:15px;font-weight:600;transition:all .15s;display:flex;justify-content:space-between;align-items:center;}
.acc-header:hover{background:#1f2937;}
.acc-header::after{content:'▸';transition:transform .2s;}
.acc-header.open::after{transform:rotate(90deg);}
.acc-header.open{background:#1f6feb22;color:#58a6ff;border-color:#1f6feb44;}
.acc-body{display:none;padding:16px;border:1px solid #30363d;border-top:none;border-radius:0 0 6px 6px;margin-top:-7px;margin-bottom:6px;background:#0d1117;}
.acc-body.show{display:block;}
.acc-body table{width:100%;border-collapse:collapse;margin:8px 0;}
.acc-body th,.acc-body td{border:1px solid #30363d;padding:6px 10px;text-align:left;font-size:13px;}
.acc-body th{background:#161b22;color:#f0f6fc;}
.acc-body td:first-child{color:#58a6ff;white-space:nowrap;font-family:monospace;}
.acc-body code{background:#1f2937;padding:2px 6px;border-radius:4px;font-size:12px;color:#e6edf3;}
.acc-body .tip{background:#1f6feb11;border-left:3px solid #58a6ff;padding:10px 14px;margin:10px 0;border-radius:0 4px 4px 0;font-size:13px;color:#c9d1d9;}
.acc-body h4{color:#3fb950;margin:14px 0 8px;font-size:14px;}
</style>

<div class="acc-header">슬래시 명령어 (자주 쓰는 것)</div>
<div class="acc-body">
<h4>세션 & 대화</h4>
<table>
<tr><th>명령어</th><th>설명</th></tr>
<tr><td>/clear</td><td>대화 이력 초기화 (별칭: /reset, /new)</td></tr>
<tr><td>/resume</td><td>이전 대화 재개 (별칭: /continue)</td></tr>
<tr><td>/compact</td><td>대화 압축 — 컨텍스트가 커졌을 때 정리</td></tr>
<tr><td>/context</td><td>컨텍스트 사용량 시각화</td></tr>
<tr><td>/rewind</td><td>이전 체크포인트로 되돌리기</td></tr>
<tr><td>/branch</td><td>현재 지점에서 대화 분기 생성</td></tr>
</table>

<h4>모델 & 성능</h4>
<table>
<tr><th>명령어</th><th>설명</th></tr>
<tr><td>/model [name]</td><td>모델 변경 (sonnet, opus 등)</td></tr>
<tr><td>/fast [on|off]</td><td>빠른 모드 토글 (비용↓ 속도↑)</td></tr>
<tr><td>/effort [low|medium|high|max]</td><td>사고 깊이 조절</td></tr>
<tr><td>/cost</td><td>토큰 사용량 및 비용 확인</td></tr>
</table>

<h4>기능</h4>
<table>
<tr><th>명령어</th><th>설명</th></tr>
<tr><td>/voice</td><td>음성 모드 활성화 (Push-to-talk)</td></tr>
<tr><td>/loop [간격] [프롬프트]</td><td>반복 실행 모니터링 (예: /loop 5m "빌드 확인")</td></tr>

<div class="acc-header">주요 기능 설명</div>
<div class="acc-body">
<h4>Computer Use (Pro/Max)</h4>
<p>Claude가 마우스/키보드를 직접 조작. UI 테스트, 브라우저 자동화, 설정 변경 등. 기존 도구로 안 되는 작업에서 자동 전환.</p>

<h4>Voice Mode</h4>
<p><code>/voice</code>로 활성화. 스페이스바 길게 눌러서 말하고 놓으면 전송. 한국어 지원. 타이핑보다 긴 설명을 빠르게 전달할 때 유용.</p>

<h4>/loop — 반복 모니터링</h4>
<p>간격 + 프롬프트를 지정하면 자동 반복 실행. 빌드 감시, 로그 체크, 서버 상태 확인 등. 터미널 닫으면 중단됨.</p>
<div class="tip">💡 예시: <code>/loop 5m "npm test 실행해서 실패하면 알려줘"</code></div>

<h4>/schedule — 클라우드 스케줄</h4>
<p>Anthropic 클라우드에서 원격 실행. 컴퓨터가 꺼져도 돌아감. 단, 로컬 파일 접근 불가 → GitHub 레포 연동 필요.</p>

<h4>Memory 시스템</h4>
<p><strong>CLAUDE.md</strong> — 프로젝트 규칙, 코딩 스타일, 빌드 명령어 저장. 모든 세션에 자동 로드.<br>
<strong>Auto Memory</strong> — 대화 중 중요 정보를 자동 기억. <code>/memory</code>로 편집 가능.</p>

<h4>MCP (Model Context Protocol)</h4>
<p>외부 서비스(DB, Slack, GitHub, Figma 등)를 Claude Code에 연결하는 프로토콜. <code>/mcp</code>로 관리.</p>

<h4>Agent Teams & Subagents</h4>
<p>여러 Claude 세션을 동시에 실행하여 병렬 작업. Worktree 기반 격리. 코드 리뷰와 구현을 동시 진행 가능.</p>

<h4>Checkpointing</h4>
<p>매 작업 전 자동 체크포인트 생성. <code>Esc + Esc</code> 또는 <code>/rewind</code>로 이전 상태 복원. 실수 시 안전망.</p>
</div>

<p>주요 이벤트: <code>SessionStart</code>, <code>PreToolUse</code>, <code>PostToolUse</code>, <code>UserPromptSubmit</code>, <code>Stop</code></p>

<h4>Skills (커스텀 스킬)</h4>
<p><code>.claude/skills/&lt;name&gt;/SKILL.md</code>에 정의. <code>/스킬이름</code>으로 호출. 자주 하는 작업을 스킬로 만들면 반복 설명 불필요.</p>

<h4>Subagents (커스텀 에이전트)</h4>
<p><code>.claude/agents/&lt;name&gt;.md</code>에 정의. 특정 역할(보안 리뷰어, 테스트 작성자 등)에 특화된 에이전트.</p>

<div class="acc-header">스킬 (Skills) — 자동/수동 호출</div>
<div class="acc-body">
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">스킬은 Claude Code가 특정 상황에서 <strong>자동으로 불러오거나</strong>, 사용자가 <strong>슬래시 명령으로 직접 호출</strong>할 수 있는 작업 모음입니다. 자주 하는 작업을 스킬로 만들면 매번 설명할 필요가 없어집니다.</p>

<h4>기본 제공 스킬 (예시)</h4>
<table>
<tr><th>스킬</th><th>설명</th></tr>
<tr><td>loop</td><td>반복 실행 모니터링 (예: <code>/loop 5m /test</code>)</td></tr>
<tr><td>schedule</td><td>클라우드 스케줄 작업 생성/관리 (cron 트리거)</td></tr>
<tr><td>simplify</td><td>변경된 코드를 재사용성/품질/효율 관점에서 리뷰 후 수정</td></tr>
<tr><td>update-config</td><td>settings.json 자동 설정 (훅 등록 등)</td></tr>
<tr><td>keybindings-help</td><td>키보드 단축키 커스터마이즈 (~/.claude/keybindings.json)</td></tr>
<tr><td>claude-api</td><td>Anthropic SDK/Agent SDK 사용 가이드</td></tr>
</table>

<h4>스킬 호출 방법</h4>
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">
1. <strong>자동 호출</strong> — Claude가 작업 맥락에서 필요하다고 판단하면 자동으로 사용<br>
2. <strong>수동 호출</strong> — <code>/스킬이름</code>으로 직접 실행<br>
3. <strong>목록 확인</strong> — <code>/skills</code> 명령어로 사용 가능한 스킬 보기
</p>

<h4>커스텀 스킬 만들기</h4>
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">
<code>.claude/skills/&lt;skill-name&gt;/SKILL.md</code> 파일로 정의합니다.
</p>
<pre style="background:#161b22;padding:12px;border-radius:6px;overflow-x:auto;font-size:12px;color:#e6edf3;border:1px solid #30363d;">---
name: deploy
description: 프로덕션 배포 워크플로우
---
1. 현재 브랜치 확인
2. 모든 테스트 통과 확인
3. 빌드 생성
4. 프로덕션 배포
5. 헬스 체크 실행</pre>

<div class="tip">💡 스킬은 자주 반복하는 워크플로우를 캡슐화할 때 유용합니다. CCTV 분석 프로젝트에서 "특정 영상에 ROI 자동 세팅 → 정체 판단 → 결과 저장" 같은 흐름을 스킬로 만들면 한 번의 명령으로 실행할 수 있습니다.</div>
</div>

<div class="acc-header">MCP 서버 (Model Context Protocol)</div>
<div class="acc-body">
<p style="color:#c9d1d9;font-size:13px;line-height:1.7;">MCP는 AI 모델에게 <strong>외부 도구, 데이터, 기능</strong>을 노출하는 표준 프로토콜입니다. OpenAI, Google, Microsoft 등 주요 AI 회사가 모두 채택하고 있어 사실상 표준이 되었습니다.</p>

<h4>주요 MCP 서버 예시</h4>
<table>
<tr><th>서버</th><th>제공 기능</th></tr>
<tr><td>context7</td><td>라이브러리/프레임워크 최신 문서 조회 (React, Django 등)</td></tr>
<tr><td>serena</td><td>심볼 기반 코드 탐색, 리팩토링 도구</td></tr>
<tr><td>playwright</td><td>브라우저 자동화, E2E 테스트, 스크린샷</td></tr>
<tr><td>magic-21st</td><td>UI 컴포넌트 빌더, 디자인 인스피레이션</td></tr>
<tr><td>sequential</td><td>단계별 사고 도구 (복잡한 추론용)</td></tr>
<tr><td>filesystem</td><td>파일 시스템 접근</td></tr>
<tr><td>github</td><td>GitHub 이슈/PR 관리</td></tr>
<tr><td>slack</td><td>Slack 메시지 송수신</td></tr>
<tr><td>postgres / sqlite</td><td>DB 쿼리 실행</td></tr>
</table>

<h4>MCP 관리 명령어</h4>
<table>
<tr><th>명령어</th><th>설명</th></tr>
<tr><td>/mcp</td><td>MCP 서버 연결 관리, OAuth 인증</td></tr>
<tr><td>claude mcp list</td><td>설치된 MCP 서버 목록</td></tr>
<tr><td>claude mcp add &lt;name&gt;</td><td>MCP 서버 추가</td></tr>
<tr><td>claude mcp remove &lt;name&gt;</td><td>MCP 서버 제거</td></tr>
<tr><td>claude --mcp-config &lt;file&gt;</td><td>특정 MCP 설정 파일 로드</td></tr>
</table>

<h4>MCP 설정 예시 (~/.claude/mcp.json)</h4>
<pre style="background:#161b22;padding:12px;border-radius:6px;overflow-x:auto;font-size:12px;color:#e6edf3;border:1px solid #30363d;">{
  "mcpServers": {
    "filesystem": {
      "command": "npx",
      "args": ["@modelcontextprotocol/server-filesystem", "/Users/me/projects"]
    },
    "github": {
      "command": "npx",
      "args": ["@modelcontextprotocol/server-github"],
      "env": { "GITHUB_TOKEN": "ghp_..." }
    }
  }
}</pre>

<div class="tip">💡 MCP 서버는 한 번 설정하면 어떤 AI 모델/플랫폼에서도 동일한 인터페이스로 사용할 수 있습니다. 자체 서비스나 데이터를 AI와 연동하려면 MCP 서버를 직접 만드는 것이 가장 표준적인 접근법입니다.</div>

<h2>개요</h2>
<p>디스패치(Dispatch)는 <strong>모바일 기기에서 PC에 실행 중인 Claude Code에 작업을 전달</strong>하는 기능이다. 출퇴근 중이나 자리를 비운 동안에도 PC에서 작업을 실행할 수 있다.</p>

<h2>어떻게 동작하나?</h2>
<ul>
<li>PC에서 Claude Code가 실행 중이어야 함</li>
<li>모바일 앱(claude.ai) 또는 웹에서 <strong>원격 명령</strong>을 전송</li>
<li>PC의 Claude Code가 명령을 받아 <strong>로컬 환경에서 실행</strong></li>
<li>결과를 모바일로 다시 전송</li>
</ul>

<h2>활용 시나리오</h2>
<ul>
<li><strong>출근길에 뉴스 생성 트리거</strong> — 폰에서 "오늘 뉴스 만들어" → PC에서 실행 → 도착하면 완료</li>
<li><strong>서버 상태 확인</strong> — 외출 중 "news-reader 서버 상태 확인해줘"</li>
<li><strong>코드 배포</strong> — 긴급 핫픽스를 모바일에서 트리거</li>
<li><strong>빌드 시작</strong> — 퇴근 전 빌드 시작 잊었을 때 모바일에서 실행</li>
</ul>

<h2>관련 명령어</h2>
<table>
<tr><th>명령어</th><th>설명</th></tr>
<tr><td>/remote-control</td><td>원격 제어 활성화/설정</td></tr>
<tr><td>claude --remote "작업"</td><td>원격 웹 세션 생성</td></tr>
</table>

<h2>테스트 해볼 것</h2>
<ul>
<li>[ ] <code>/remote-control</code> 명령어로 원격 제어 설정 확인</li>
<li>[ ] 모바일에서 claude.ai 접속 후 원격 명령 전송 테스트</li>
<li>[ ] "서버 상태 확인" 같은 간단한 원격 명령부터 시작</li>
<li>[ ] 모바일에서 뉴스 생성 트리거해보기</li>
<li>[ ] 응답 시간, 안정성 체감 확인</li>
</ul>

<h2>주의사항</h2>
<ul>
<li>PC가 켜져 있고 Claude Code가 실행 중이어야 함</li>
<li>네트워크 연결 필수</li>
<li>보안: 원격 명령 실행이므로 권한 설정에 주의</li>
</ul>
`
  }
];

function loadUserRequestTests() {
  const list = $('#urList');
  list.innerHTML = USER_REQUEST_TESTS
    .map(t => `<button class="wt-btn" data-ur-id="${t.id}">🔬 ${t.title}</button>`)
    .join('');

  list.querySelectorAll('.wt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const test = USER_REQUEST_TESTS.find(t => t.id === btn.dataset.urId);
      if (!test) return;

      stopTTS();
      currentDate = null;
      btnPlay.disabled = true;
      document.querySelectorAll('.date-btn, .exp-btn, .wt-btn').forEach(b => b.classList.remove('active'));
      $('#btnGuide').classList.remove('active');
      btn.classList.add('active');

      newsBody.innerHTML = test.html;
      statusEl.textContent = `사용자 요청 테스트: ${test.title}`;
    });
  });
}

loadDates();
loadExperiments();
loadWeeklyTests();
loadUserRequestTests();
